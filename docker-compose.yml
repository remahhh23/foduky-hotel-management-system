version: "3.9"

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: jarash
      POSTGRES_USER: jarash
      POSTGRES_PASSWORD: jarash123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarash"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src
      dockerfile: Dockerfile.api
    environment:
      Database__Provider: PostgreSQL
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=jarash;Username=jarash;Password=jarash123"
      Jwt__Secret: "JarashSuperSecretKey2026!@#$%^&*()AtLeast32Chars"
      Cors__Origin: "http://localhost:80"
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  web:
    build:
      context: ./src
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
